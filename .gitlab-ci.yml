stages:
  - validate
  - test
  - security
  - performance
  - package

default:
  interruptible: true

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

markdown:
  stage: validate
  image: node:22-alpine
  before_script:
    - npm install --global markdownlint-cli2@0.17.2
  script:
    - markdownlint-cli2 "**/*.md" "#node_modules"

plantuml:
  stage: validate
  image:
    name: plantuml/plantuml:1.2025.4
    entrypoint: [""]
  script:
    - find diagrams docs -name '*.puml' -print0 | xargs -0 plantuml -checkonly
    - mkdir -p build/diagrams
    - find diagrams docs -name '*.puml' -print0 | xargs -0 plantuml -tsvg -o "$CI_PROJECT_DIR/build/diagrams"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/diagrams/

terraform:
  stage: validate
  image:
    name: hashicorp/terraform:1.9.8
    entrypoint: [""]
  cache:
    key: terraform-provider-cache
    paths:
      - infra/terraform/.terraform/
  script:
    - terraform -chdir=infra/terraform fmt -check -recursive
    - terraform -chdir=infra/terraform init -backend=false
    - terraform -chdir=infra/terraform validate

node-unit-tests:
  stage: test
  image: node:22-alpine
  rules:
    - exists:
        - package.json
  script:
    - npm ci
    - npm test -- --coverage
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml
    paths:
      - coverage/

reference-unit-tests:
  stage: test
  image: python:3.13-slim
  script:
    - PYTHONPATH=src python -m unittest discover -s tests -v
    - python quality/coverage/run.py
    - python quality/mutation/run.py
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - reports/coverage/summary.json
      - reports/mutation/summary.json

secret-and-filesystem-scan:
  stage: security
  image:
    name: aquasec/trivy:0.59.1
    entrypoint: [""]
  script:
    - trivy filesystem --exit-code 1 --severity HIGH,CRITICAL --scanners vuln,secret,misconfig .

hot-seat-load-test:
  stage: performance
  image:
    name: grafana/k6:0.57.0
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $LOAD_TEST_BASE_URL
    - if: $CI_MERGE_REQUEST_LABELS =~ /performance-test/ && $LOAD_TEST_BASE_URL
  script:
    - BASE_URL="$LOAD_TEST_BASE_URL" EVENT_ID="$LOAD_TEST_EVENT_ID" SEAT_ID="$LOAD_TEST_SEAT_ID" ACCESS_TOKEN="$LOAD_TEST_ACCESS_TOKEN" k6 run quality/load/hot-seat-contention.js
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - hot-seat-summary.json

submission-package:
  stage: package
  image: alpine:3.21
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - apk add --no-cache zip
    - zip -r "ticketplus-${CI_COMMIT_TAG}.zip" . -x '.git/*' -x '.terraform/*' -x '*.tfstate*'
  artifacts:
    expire_in: 90 days
    paths:
      - ticketplus-*.zip
